services:

  zookeeper:
    user: root
    image: apachepulsar/pulsar:latest
    container_name: zookeeper
    restart: on-failure
    networks:
      - pulsar
    volumes:
      - /home/developer/pulsar/data/zookeeper:/pulsar/data/zookeeper
    environment:
      metadataStoreUrl: zk:zookeeper:2181
      PULSAR_MEM: "-Xms256m -Xmx256m -XX:MaxDirectMemorySize=256m"
    command: >
      bash -c "
      bin/apply-config-from-env.py conf/zookeeper.conf &&
      bin/generate-zookeeper-config.sh conf/zookeeper.conf &&
      exec bin/pulsar zookeeper
      "
    healthcheck:
      test: ["CMD", "bin/pulsar-zookeeper-ruok.sh"]
      interval: 10s
      timeout: 5s
      retries: 30


  pulsar-init:
    image: apachepulsar/pulsar:latest
    container_name: pulsar-init
    hostname: pulsar-init
    networks:
      - pulsar
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      authPlugin: org.apache.pulsar.client.impl.auth.AuthenticationToken
      authParams: token:eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbiJ9.8np05xthLN9N-1mZWNGTKWbq96HB3D6hUi8iHdu6HLs
    command: >
      bin/pulsar initialize-cluster-metadata 
      --cluster cluster-a 
      --metadata-store zk:zookeeper:2181
      --configuration-metadata-store zk:zookeeper:2181
      --web-service-url http://broker:8080
      --broker-service-url pulsar://broker:6650

  bookie:
    user: root
    image: apachepulsar/pulsar:latest
    container_name: bookie
    restart: on-failure
    networks:
      - pulsar
    volumes:
      - /home/developer/pulsar/data/bookkeeper:/pulsar/data/bookkeeper
    environment:
      clusterName: cluster-a
      zkServers: zookeeper:2181
      metadataServiceUri: metadata-store:zk:zookeeper:2181
      advertisedAddress: bookie
      BOOKIE_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m"
      
      authenticationEnabled: false
      authenticationProviders: org.apache.pulsar.broker.authentication.AuthenticationProviderToken
      authorizationEnabled: false
      brokerClientAuthenticationPlugin: org.apache.pulsar.client.impl.auth.AuthenticationToken
      brokerClientAuthenticationParameters: token:eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbiJ9.8np05xthLN9N-1mZWNGTKWbq96HB3D6hUi8iHdu6HLs
    depends_on:
      zookeeper:
        condition: service_healthy
      pulsar-init:
        condition: service_completed_successfully
    command: >
      bash -c "
      bin/apply-config-from-env.py conf/bookkeeper.conf &&
      exec bin/pulsar bookie
      "

  broker:
    user: root
    image: apachepulsar/pulsar:latest
    container_name: broker
    hostname: broker
    restart: on-failure
    volumes: 
      - /home/developer/pulsar/conf/broker:/pulsar/secrets
    networks:
      - pulsar
    ports:
      - "13080:6650"
      - "8090:8080"
    environment:
      metadataStoreUrl: zk:zookeeper:2181
      zookeeperServers: zookeeper:2181
      clusterName: cluster-a
      managedLedgerDefaultEnsembleSize: 1
      managedLedgerDefaultWriteQuorum: 1
      managedLedgerDefaultAckQuorum: 1
      advertisedListeners: external:pulsar://136.243.156.113:13080
      internalListenerName: external
      advertisedAddress: 136.243.156.113
      brokerServicePort: 6650
      webServicePort: 8080                                    
      brokerServiceUrl: pulsar://136.243.156.113:13080          
      webServiceUrl: http://136.243.156.113:8090
      PULSAR_MEM: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m
      authenticationEnabled: false
      authenticationProviders: org.apache.pulsar.broker.authentication.AuthenticationProviderToken
      tokenSecretKey: file:///pulsar/secrets/admin-key.key
      superUserRoles: admin,broker_client
    depends_on:
      zookeeper:
        condition: service_healthy
      bookie:
        condition: service_started
    command: >
      bash -c "
      bin/apply-config-from-env.py conf/broker.conf &&
      echo 'authenticationEnabled=false' >> conf/broker.conf &&
      echo 'authenticationProviders=org.apache.pulsar.broker.authentication.AuthenticationProviderToken' >> conf/broker.conf &&
      echo 'authorizationEnabled=false' >> conf/broker.conf &&
      echo 'superUserRoles=admin' >> conf/broker.conf &&
      echo 'tokenSecretKey=file:///pulsar/secrets/admin-key.key' >> conf/broker.conf &&
      echo 'brokerClientAuthenticationPlugin=org.apache.pulsar.client.impl.auth.AuthenticationToken' >> conf/broker.conf &&
      echo 'brokerClientAuthenticationParameters=token:eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbiJ9.8np05xthLN9N-1mZWNGTKWbq96HB3D6hUi8iHdu6HLs' >> conf/broker.conf &&
      exec bin/pulsar broker
      "

      
# JWT admin: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbiJ9.8np05xthLN9N-1mZWNGTKWbq96HB3D6hUi8iHdu6HLs      

networks:
  pulsar:
    driver: bridge

 